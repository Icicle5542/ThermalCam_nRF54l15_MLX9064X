# UART logging — immediate (synchronous) mode prevents dropped messages
# when many lines are emitted back-to-back (e.g. the 31-line image frame).
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_DEFAULT_LEVEL=4
CONFIG_LOG_MODE_IMMEDIATE=y

# Suppress noisy kernel mutex/scheduler debug traces from the 'os' module.
CONFIG_LOG_OVERRIDE_LEVEL=0
CONFIG_KERNEL_LOG_LEVEL_WRN=y

# Suppress BT stack / HCI / SoftDevice Controller debug traces.
CONFIG_BT_HCI_CORE_LOG_LEVEL_WRN=y
CONFIG_BT_HCI_DRIVER_LOG_LEVEL_WRN=y
CONFIG_BT_LOG_LEVEL_WRN=y

# Suppress CRACEN crypto driver power-on/off debug traces.
CONFIG_CRACEN_LOG_LEVEL_WRN=y

# I2C driver for MLX90640
CONFIG_I2C=y

# Floating-point support (Cortex-M33 FPU)
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# Enable %f / %.1f in LOG_INF and printk
CONFIG_CBPRINTF_FP_SUPPORT=y

# ── BLE Nordic UART Service (NUS) ─────────────────────────────────────────
# BLE stack — Peripheral role (advertise + accept connections)
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="ThermalCam"
CONFIG_BT_DEVICE_APPEARANCE=0

# Nordic UART Service
CONFIG_BT_NUS=y

# Data Length Extension: up to 251-byte LL payload → 244-byte ATT payload
# This reduces the number of notifications per frame from 39 to 4.
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=255
CONFIG_BT_BUF_ACL_TX_SIZE=255

# BLE callbacks run on the system workqueue — give it more stack
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

